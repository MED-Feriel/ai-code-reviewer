global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: api-ai
    static_configs:
      - targets: ["api-ai:8000"]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: /prometheus/metrics