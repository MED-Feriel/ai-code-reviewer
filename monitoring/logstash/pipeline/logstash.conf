input {
  tcp {
    port => 5000
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

filter {
  mutate {
    add_field => { "project" => "ai-code-reviewer" }
  }

  if [service] {
    mutate {
      add_field => { "service_name" => "%{service}" }
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ai-code-reviewer-%{+YYYY.MM.dd}"
  }
}