networks:
  reviewer-net:
    driver: bridge

volumes:
  postgres-data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - reviewer-net
    environment:
      POSTGRES_DB: code_reviewer
      POSTGRES_USER: reviewer
      POSTGRES_PASSWORD: reviewer123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewer -d code_reviewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-ai:
    build:
      context: ./api-ai
    container_name: api-ai
    networks:
      - reviewer-net
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://reviewer:reviewer123@postgres:5432/code_reviewer
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    networks:
      - reviewer-net
    ports:
      - "3000:3000"
    environment:
      - AI_API_URL=http://api-ai:8000
    depends_on:
      - api-ai
    restart: unless-stopped