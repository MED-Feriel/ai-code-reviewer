networks:
  reviewer-net:
    driver: bridge

volumes:
  postgres-data:
  mlflow-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  logstash-data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - reviewer-net
    environment:
      POSTGRES_DB: code_reviewer
      POSTGRES_USER: reviewer
      POSTGRES_PASSWORD: reviewer123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewer -d code_reviewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: mlflow
    networks:
      - reviewer-net
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --static-prefix /mlflow
    restart: unless-stopped

  api-ai:
    build:
      context: ./api-ai
    container_name: api-ai
    networks:
      - reviewer-net
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://reviewer:reviewer123@postgres:5432/code_reviewer
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    networks:
      - reviewer-net
    ports:
      - "3000:3000"
    environment:
      - AI_API_URL=http://api-ai:8000
    depends_on:
      - api-ai
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - reviewer-net
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - reviewer-net
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=213.250.150.11
      - GF_SERVER_ROOT_URL=http://213.250.150.11/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - reviewer-net
    ports:
      - "9100:9100"
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: elasticsearch
    networks:
      - reviewer-net
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: logstash:8.13.0
    container_name: logstash
    networks:
      - reviewer-net
    ports:
      - "5044:5044"
      - "5001:5000"
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline
      - logstash-data:/usr/share/logstash/data
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  kibana:
    image: kibana:8.13.0
    container_name: kibana
    networks:
      - reviewer-net
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped