networks:
  reviewer-net:
    driver: bridge

volumes:
  postgres-data:
  mlflow-data:
  prometheus-data:
  grafana-data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - reviewer-net
    environment:
      POSTGRES_DB: code_reviewer
      POSTGRES_USER: reviewer
      POSTGRES_PASSWORD: reviewer123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewer -d code_reviewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: mlflow
    networks:
      - reviewer-net
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped

  api-ai:
    build:
      context: ./api-ai
    container_name: api-ai
    networks:
      - reviewer-net
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://reviewer:reviewer123@postgres:5432/code_reviewer
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    networks:
      - reviewer-net
    ports:
      - "3000:3000"
    environment:
      - AI_API_URL=http://api-ai:8000
    depends_on:
      - api-ai
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - reviewer-net
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - reviewer-net
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://213.250.150.11/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
    restart: unless-stopped
