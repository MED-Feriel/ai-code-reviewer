name: 🚀 CI/CD — AI Code Reviewer

on:
  push:
    branches: [main, feature/ai-code-reviewer]
  pull_request:
    branches: [main]
jobs:

  test-api:
    name: 🧪 Test — API AI (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install flake8
      - run: flake8 . --max-line-length=130 --ignore=E302,E303,E305,F401 --exclude=__pycache__
      - run: pytest test_main.py -v

  test-frontend:
    name: 🧪 Test — Frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  build-push-api:
    name: 🐳 Build & Push — api-ai
    runs-on: ubuntu-latest
    needs: [test-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./api-ai
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-api:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-api:v${{ github.run_number }}

  build-push-frontend:
    name: 🐳 Build & Push — frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-code-reviewer-frontend:v${{ github.run_number }}

  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-push-api, build-push-frontend]
    if: always()
    steps:
      - run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🚀 AI Code Reviewer — CI/CD Pipeline"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Run    : #${{ github.run_number }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"